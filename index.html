<!DOCTYPE html>

<head>

    <title>Painel de Bingo</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="topbar">

    </div>

</div>

<script src="script.js"></script>

</html>
